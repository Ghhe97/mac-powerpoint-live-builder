[project]
name = "powerpoint-live-mcp"
version = "0.1.0"
description = "Local stdio MCP server for live Microsoft PowerPoint control on macOS."
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["mcp", "powerpoint", "applescript", "macos", "pptx"]
classifiers = [
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
]
dependencies = [
    "mcp>=1.0.0",
    "Pillow>=10.0",
]

[project.scripts]
powerpoint-live-mcp = "pptx_mcp.server:main"
pptx-mcp = "pptx_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pptx_mcp"]
